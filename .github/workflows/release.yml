name: Release

# Publishes the library to npm with provenance via OIDC trusted publishing (no npm token needed).
# Run it from the branch of the line you are releasing, after bumping the version in
# projects/ngx-datatables-net/package.json. The npm dist-tag is DERIVED from the branch
# automatically (main -> latest, <N>.x -> ng<N>), so a maintenance-line release can never clobber
# `latest`. The version major is also checked against the branch as a safety net.
on:
  workflow_dispatch:

permissions:
  contents: write # create the git tag + GitHub Release after publishing
  id-token: write # required for npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Derive npm dist-tag from the branch and verify the version
        id: meta
        run: |
          ref='${{ github.ref_name }}'
          version="$(node -p "require('./projects/ngx-datatables-net/package.json').version")"
          major="${version%%.*}"
          if [ "$ref" = "main" ]; then
            tag="latest"
          elif printf '%s' "$ref" | grep -qE '^[0-9]+\.x$'; then
            line="${ref%.x}"
            tag="ng${line}"
            if [ "$major" != "$line" ]; then
              echo "::error::Version $version (major $major) does not match release line $ref."
              exit 1
            fi
          else
            echo "::error::Refusing to publish from branch '$ref'. Run Release from main or an <N>.x branch."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "Publishing $version with dist-tag '$tag' from branch '$ref'."

      # Trusted publishing (OIDC) needs a recent npm.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npx ng build ngx-datatables-net
      - run: npm publish --provenance --access public --tag '${{ steps.meta.outputs.tag }}'
        working-directory: dist/ngx-datatables-net

      # Tag the published commit and cut a GitHub Release. The dist-tag drives "latest":
      # only the main line (dist-tag `latest`) is marked the latest GitHub Release; maintenance
      # lines are published as non-latest so they never displace it. Idempotent: skips if the
      # tag/release already exists.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version='${{ steps.meta.outputs.version }}'
          disttag='${{ steps.meta.outputs.tag }}'
          major='${{ steps.meta.outputs.major }}'
          if [ "$disttag" = "latest" ]; then
            latest_flag="--latest"
            install="npm i ngx-datatables-net"
          else
            latest_flag="--latest=false"
            install="npm i ngx-datatables-net@$disttag"
          fi
          if gh release view "v$version" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$version already exists — skipping."
          else
            gh release create "v$version" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "v$version (Angular $major)" \
              --notes "Angular $major line — npm dist-tag \`$disttag\`. \`$install\`. See [CHANGELOG](https://github.com/$GITHUB_REPOSITORY/blob/$GITHUB_REF_NAME/CHANGELOG.md)." \
              $latest_flag
          fi
