              {
                "@type": "Question",
                "name": "Does ngx-datatables-net require jQuery?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "You never write jQuery. The library uses DataTables' non-jQuery API. DataTables itself still uses jQuery internally, so it sits in your dependency tree as a transitive dependency of datatables.net, but it never appears in your own code."
                }
              },
              {
                "@type": "Question",
                "name": "Which Angular versions are supported?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Angular 20, 21 and 22. There is one package major per Angular major: install 22.x for Angular 22 (npm tag latest), 21.x for Angular 21 (ng21), and 20.x for Angular 20 (ng20)."
                }
              },
              {
                "@type": "Question",
                "name": "How do I reload the table with new data?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Assign a new array to the dtData signal input. The directive reconciles the table automatically (clear, add rows, redraw) and keeps the current page and sort. There is no manual trigger like the old dtTrigger Subject."
                }
              },
              {
                "@type": "Question",
                "name": "How do I avoid XSS when showing user data?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Add withSafeDefaults() to provideDataTables(). It escapes every column that has no explicit renderer, which overrides DataTables' unsafe HTML-by-default behavior. To render HTML on purpose, use the DomSanitizer-backed renderer the library provides."
                }
              },
              {
                "@type": "Question",
                "name": "Does it support Ajax and server-side processing?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. Set the ajax option for client-side loading, or serverSide: true with an ajax function that posts the paging, sort and search parameters to your API. The directive passes the full DataTables config through."
                }
              },
              {
                "@type": "Question",
                "name": "Which DataTables extensions work?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "All of them, with no library-specific code: Buttons, Select, ColumnControl, Responsive, FixedHeader, FixedColumns, Scroller, RowGroup, RowReorder, ColReorder, SearchPanes, SearchBuilder, KeyTable, AutoFill, DateTime and StateRestore. Import the extension package and configure it through dtOptions. The commercial Editor is compatible via the exposed Api."
                }
              },
              {
                "@type": "Question",
                "name": "Can I use it with server-side rendering (SSR)?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. The table initialises in the browser only (via afterNextRender), so the server renders plain table markup and the table is enhanced on the client during hydration."
                }
