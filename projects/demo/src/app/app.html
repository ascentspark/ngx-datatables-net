<header class="demo-header">
  <div class="demo-header__brand">
    <a routerLink="/" class="demo-header__name">ngx-datatables-net</a>
    <span class="demo-header__tagline">
      Modern Angular wrapper for
      <a href="https://datatables.net" target="_blank" rel="noopener">DataTables.net</a>
    </span>
  </div>

  <div class="demo-header__meta">
    <a href="https://ascentspark.com" target="_blank" rel="noopener" class="demo-header__maintainer">
      <span>Angular wrapper maintained by</span>
      <asc-glyph class="demo-header__glyph" />
      <span class="demo-header__maintainer-name">ascentspark</span>
    </a>
    <button type="button" class="demo-header__dark" (click)="toggleDark()">
      {{ dark() ? 'Light' : 'Dark' }}
    </button>
  </div>
</header>

<div class="demo-layout">
  <aside class="demo-sidebar">
    @for (group of nav; track group.title) {
      <nav class="demo-navgroup">
        <h3 class="demo-navgroup__title">{{ group.title }}</h3>
        <ul class="demo-navgroup__list">
          @for (item of group.items; track item.path) {
            <li>
              <a
                class="demo-navlink"
                [routerLink]="'/' + item.path"
                routerLinkActive="demo-navlink--active"
                [routerLinkActiveOptions]="{ exact: item.path === '' }"
              >
                {{ item.label }}
              </a>
            </li>
          }
        </ul>
      </nav>
    }
  </aside>

  <main class="demo-main">
    <router-outlet />
  </main>
</div>
